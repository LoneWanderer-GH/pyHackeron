name = "corelec_ada"
description = "Ada 2022 library for Corelec BLE lifecycle and frame decoding"
version = "0.1.0-dev"
project-files = ["corelec_ada.gpr"]
tags = ["ada", "ble", "decoder", "library", "c-bindings"]
licenses = "MIT"

[[depends-on]]
gprbuild = "*"

# ---- Toolchains de cross-compilation ----------------------------------------------------------------------------
#
# Pour chaque backend, le toolchain C/C++ requis est EXTERNE a Alire
# (Alire gere le toolchain Ada/GNAT ; le toolchain C est systeme).
#
# Backend          Toolchain C requis               Installation
# ---------------- -------------------------------- ----------------------------------------------------------------
# winrt            MSVC (VS 2022) ou mingw64-gcc     Visual Studio / MSYS2 pacman -S mingw-w64-x86_64-gcc
# btstack_winusb   mingw64-gcc (Windows natif)       MSYS2 pacman -S mingw-w64-x86_64-gcc
# btstack_posix    x86_64-linux-gnu-gcc              MSYS2 pacman -S mingw-w64-x86_64-cross-gcc-x86-linux-gnu
#                  arm-none-eabi-gcc (Raspberry Pi)  https://developer.arm.com/downloads/-/arm-gnu-toolchain-downloads
# nimble_posix     x86_64-linux-gnu-gcc              idem ci-dessus
# bluez            (Linux natif uniquement)          -
#
# Exemples d'invocation gprbuild avec cross-toolchain :
#
#   -- BTstack, cross Linux x86_64 :
#   gprbuild -XCORELEC_BLE_BACKEND=btstack_posix \
#            --target=x86_64-linux-gnu \
#            --RTS=light \
#            -P corelec_ada.gpr
#
#   -- BTstack, cross Linux ARM (Raspberry Pi) :
#   gprbuild -XCORELEC_BLE_BACKEND=btstack_posix \
#            --target=arm-linux-gnueabihf \
#            -P corelec_ada.gpr
#
#   -- NimBLE, cross Linux x86_64 :
#   gprbuild -XCORELEC_BLE_BACKEND=nimble_posix \
#            --target=x86_64-linux-gnu \
#            -P corelec_ada.gpr
#
# Note : pour les cross-toolchains Ada, vous pouvez utiliser
#   alr toolchain --select  (liste les GNAT cross disponibles dans l'index Alire)
